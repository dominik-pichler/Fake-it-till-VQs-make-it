# Which feature extractor to use.
# One of: spectral, forensic, spectral_forensic, multi_encoder, combined
extractor: spectral_forensic

# --- Per-extractor settings ---
# Only the section matching `extractor` above is consumed. Keys map
# directly to FeatureConfig / MultiEncoderConfig fields; omit any key
# to fall back to the dataclass default.

spectral:
  image_size: 256
  grid_sizes: [8, 10, 13, 16]
  peak_bin_radius: 1
  n_radial_bins: 32
  qft_low_freq_fraction: 0.25

  # Residual method (how content is suppressed before lens analysis).
  # One of: gaussian | median | multi_gaussian | wavelet
  residual_method: gaussian
  residual_sigma: 1.0                 # used by 'gaussian'
  residual_sigmas: [0.5, 1.0, 2.0]    # used by 'multi_gaussian'
  residual_median_size: 3             # used by 'median'
  residual_wavelet_levels: 2          # used by 'wavelet'
  residual_wavelet_lambda: 3.0        # used by 'wavelet'

  use_rgb_lens: true
  use_dct_lens: true
  use_qft_lens: true

forensic:
  image_size: 256
  # SRM (Steganalysis Rich Model) residual moments
  use_srm: true
  srm_truncate: 2.0
  # Haar 2D wavelet sub-band moments (numpy-native; no pywavelets dep)
  use_wavelet: true
  wavelet_levels: 3
  # Bit-count LBP histograms (numpy-native; no scikit-image dep)
  # 9 bins per radius (count of brighter neighbours, 0..8).
  use_lbp: true
  lbp_radii: [1, 2]

spectral_forensic:
  # Override individual spectral / forensic fields here; leave the sub-blocks
  # empty to use the dataclass defaults from each extractor.
  spectral: {}
  forensic: {}

multi_encoder:
  image_size: 256
  embed_dim: 512
  use_sl: true            # ResNet101 (ImageNet supervised)
  use_vsl: true           # ViT-B/16 (ImageNet supervised)
  use_ssl: true           # DINO ResNet50 (self-supervised)
  freeze_backbones: true
  device: cpu             # cpu | cuda | cuda:0 | ...

combined:
  device: cpu
  # Override individual spectral / multi_encoder fields here if needed;
  # leave the sub-blocks empty to use the dataclass defaults.
  spectral: {}
  multi_encoder: {}
